name: Release
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: .exe
            installer: frontend/src-tauri/target/release/bundle/msi/Owl_*.msi
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: ""
            installer: |
              frontend/src-tauri/target/release/bundle/deb/*.deb
              frontend/src-tauri/target/release/bundle/appimage/*.AppImage
          - os: macos-latest
            target: aarch64-apple-darwin
            ext: ""
            installer: frontend/src-tauri/target/release/bundle/dmg/*.dmg

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm install
        working-directory: frontend

      - name: Build Go sidecar
        run: |
          mkdir -p frontend/src-tauri/binaries
          cd backend
          go build -o "../frontend/src-tauri/binaries/owl-backend-${{ matrix.target }}${{ matrix.ext }}" ./cmd/owl

      - name: Build Tauri installer
        run: pnpm tauri build
        working-directory: frontend

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ runner.os }}
          path: "${{ matrix.installer }}"

  release:
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
